version: "3.8"

services:

  backend:
    build: ./backend
    container_name: cyber-backend
    ports:
      - "8080:8080"

    depends_on:
      - mongodb

    environment:
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/cyber_incident_db

  mongodb:
    image: mongo:7
    container_name: cyber-mongodb

    ports:
      - "27017:27017"

    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data: